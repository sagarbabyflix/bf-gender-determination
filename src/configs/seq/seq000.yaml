experiment:
  seed: 88
  save_dir: ../experiments/


data: 
  annotations: ../data/train_feat_kfold.csv
  data_dir: ../data/train-features/
  input: imgfile
  target: target
  outer_fold: 0
  dataset:
    name: FeatureDataset
    params:
      flip: true


transform:
  resize:
  augment:
  crop:
  preprocess: 


task: 
  name: ClassificationTask
  params: 


model:
  name: TransformerCls
  params:
    embedding_dim: 1280
    hidden_dim: 128
    n_layers: 2
    num_classes: 1
    dropout: 0.5
    attn_dropout: 0.2


loss:
  name: BCEWithLogitsLoss
  params:


optimizer:
  name: AdamW
  params:
    lr: 1.0e-5
    weight_decay: 5.0e-4


scheduler: 
  name: CosineAnnealingLR
  params:
    final_lr: 0.0


train:
  batch_size: 128
  num_epochs: 10


evaluate: 
  metrics: [AUROC]
  monitor: auroc
  mode: max


