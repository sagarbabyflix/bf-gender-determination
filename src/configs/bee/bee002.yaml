experiment:
  seed: 88
  save_dir: ../experiments/


data: 
  annotations: ../data/train_kfold.csv
  data_dir: ../data/train/
  input: imgfile
  target: target
  outer_fold: 0
  dataset:
    name: SETIDataset
    params:
      concatenate: true
      verbose: true


transform:
  resize:
  augment:
  crop:
  preprocess: 


task: 
  name: ClassificationTask
  params: 


model:
  name: Net2D
  params:
    backbone: nfnet_l0
    pretrained: true
    num_classes: 1
    dropout: 0.5
    in_channels: 1
    multisample_dropout: true
    pool: avg


loss:
  name: BCEWithLogitsLoss
  params:


optimizer:
  name: AdamW
  params:
    lr: 3.0e-4
    weight_decay: 5.0e-4


scheduler: 
  name: CosineAnnealingLR
  params:
    final_lr: 0.0


train:
  batch_size: 30
  num_epochs: 3


evaluate: 
  metrics: [AUROC]
  monitor: auroc
  mode: max


